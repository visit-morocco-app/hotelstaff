<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HotelStaff — Connexion</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0F6E56">
<link rel="stylesheet" href="style.css">
<style>
  .version { font-size: 11px; color: var(--muted); margin-top: 32px; }
  .divider { display:flex; align-items:center; gap:10px; margin: 4px 0; }
  .divider span { font-size:12px; color:var(--muted); white-space:nowrap; }
  .divider::before, .divider::after { content:''; flex:1; height:0.5px; background:var(--border); }
  .hs-login-logo {
    width: 72px; height: 72px;
    background: #0F6E56;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
  }
  .hs-login-logo span {
    font-size: 28px;
    font-weight: 900;
    color: #ffffff;
    font-family: 'Arial Black', sans-serif;
    letter-spacing: -1px;
  }
</style>
</head>
<body>

<div class="hs-login" id="login-screen">
  <div class="hs-login-logo">
    <span>HS</span>
  </div>
  <h1 class="hs-login-title">HotelStaff</h1>
  <p class="hs-login-sub">Connectez-vous à votre espace</p>
  <div class="hs-login-form">
    <input class="hs-input" type="email" id="email" placeholder="Adresse email" autocomplete="email">
    <input class="hs-input" type="password" id="pass" placeholder="Mot de passe" autocomplete="current-password">
    <button class="hs-btn hs-btn-primary hs-btn-full" id="btn-login">Se connecter</button>
    <div class="hs-login-error" id="login-error">Email ou mot de passe incorrect</div>
  </div>
  <p class="version">HotelStaff v1.0 · Par Amine</p>
</div>

<div id="loading" style="position:fixed;inset:0;background:var(--surface);display:flex;align-items:center;justify-content:center;z-index:400;">
  <div style="text-align:center">
    <div style="width:36px;height:36px;border:3px solid var(--teal-light);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;"></div>
    <p style="font-size:13px;color:var(--muted);">Chargement…</p>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script type="module">
import { login, onAuth, getUserProfile, ROLE_PAGES } from './firebase.js';
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

// Mapping rôle → clé module Firebase
const ROLE_MODULE = {
  directeur:     'directeur',
  gouv_generale: 'gouvernante_generale',
  gouv_etage:    'gouvernante_etage',
  staff:         'staff',
  reception:     'reception',
  maintenance:   'maintenance'
};

async function getModules(hotelId) {
  try {
    const db = getDatabase(getApp());
    const snap = await get(ref(db, `hotels/${hotelId}/modules`));
    return snap.val() || null;
  } catch(e) { return null; }
}

async function redirigerUtilisateur(profil) {
  const page = ROLE_PAGES[profil.role];
  if (!page) return false;

  // Si pas de modules configurés → accès libre (anciens hôtels)
  const modules = await getModules(profil.hotel_id);
  if (!modules) { window.location.href = page; return true; }

  const moduleKey = ROLE_MODULE[profil.role];
  if (modules[moduleKey] === false) {
    // Module désactivé
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('login-error');
    errEl.textContent = 'Votre espace n\'est pas activé. Contactez votre directeur.';
    errEl.classList.add('show');
    return false;
  }

  window.location.href = page;
  return true;
}

onAuth(async (user) => {
  document.getElementById('loading').style.display = 'none';
  if (user) {
    if (user.email === 'amine.assou.pro@gmail.com') {
      window.location.href = 'admin.html'; return;
    }
    const profil = await getUserProfile(user.uid);
    if (profil) await redirigerUtilisateur(profil);
  }
});

document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('btn-login');

  if (!email || !pass) {
    errEl.textContent = 'Veuillez remplir tous les champs';
    errEl.classList.add('show'); return;
  }

  btn.textContent = 'Connexion…';
  btn.disabled = true;
  errEl.classList.remove('show');

  try {
    const cred   = await login(email, pass);
    const profil = await getUserProfile(cred.user.uid);
    if (profil) {
      const redirige = await redirigerUtilisateur(profil);
      if (!redirige) { btn.textContent = 'Se connecter'; btn.disabled = false; }
    } else if (cred.user.email === 'amine.assou.pro@gmail.com') {
      window.location.href = 'admin.html';
    } else {
      errEl.textContent = 'Profil introuvable. Contactez votre administrateur.';
      errEl.classList.add('show');
      btn.textContent = 'Se connecter'; btn.disabled = false;
    }
  } catch(e) {
    errEl.textContent = 'Email ou mot de passe incorrect';
    errEl.classList.add('show');
    btn.textContent = 'Se connecter'; btn.disabled = false;
  }
});

document.getElementById('pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});
</script>

<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>
</body>
</html>
